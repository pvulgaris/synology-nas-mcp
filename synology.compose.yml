# Container Manager "Project" definition for synology-nas-mcp.
#
# Deployment shape (on the NAS):
#
#   /volume1/docker/synology-nas-mcp/
#     ├── docker-compose.yml     (copy of this file, renamed)
#     ├── .env                   (secrets — see .env.example; NEVER committed)
#     └── audit/                 (bind-mounted into the container at /audit)
#
# Container Manager → Project → Create → "Use existing docker-compose.yml" →
# point at the directory above.
#
# Upgrade path: run `npm run deploy` from the repo on your Mac. It uploads
# the tar, imports the image, stops + recreates this project, and verifies
# the new version on /health — all via DSM Web API, no UI clicks. See
# docs/SETUP.md for the one-time setup that enables it.

services:
  synology-nas-mcp:
    image: synology-mcp:latest
    container_name: synology-mcp
    restart: unless-stopped
    network_mode: host
    # Defense in depth — the daemon runs as `node` (uid 1000) inside the
    # container and drops every Linux capability. The bearer + Origin checks
    # at /mcp do the actual access control; this just narrows blast radius.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN}
      DSM_BASE_URL: ${DSM_BASE_URL}
      DSM_OP_VAULT: ${DSM_OP_VAULT}
      DSM_OP_ITEM: ${DSM_OP_ITEM:-Synology DSM - claude-mcp}
      DSM_USER: ${DSM_USER:-claude-mcp}
      MCP_BIND_HOST: ${MCP_BIND_HOST:-}
      MCP_BIND_PORT: ${MCP_BIND_PORT:-8765}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,null}
      TLS_REJECT_UNAUTHORIZED: ${TLS_REJECT_UNAUTHORIZED:-0}
      # Optional router (SRM) target — unset = NAS-only.
      SRM_BASE_URL: ${SRM_BASE_URL:-}
      SRM_USER: ${SRM_USER:-}
      SRM_OP_ITEM: ${SRM_OP_ITEM:-Synology SRM - claude-mcp}
    volumes:
      - ./audit:/audit
